<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>{{ config.app_name }} {{ config.app_emoji }} | {{ config.login_title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#0f0f1a;
  --surface:#151528;
  --surface-2:#1e1e3a;
  --border:rgba(255,255,255,0.06);
  --text:#e8e8f0;
  --text-dim:#8b8ba3;
  --accent:{{ config.brand_color }};
  --accent-2:{{ config.brand_color_secondary }};
  --danger:{{ config.danger_color }};
  --success:{{ config.success_color }};
  --glow:{{ config.brand_color }}20;
}
body{
  background:var(--primary);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Inter',sans-serif;
  color:var(--text);
  overflow:hidden;
  position:relative;
}

/* Animated Background */
.bg-mesh{
  position:fixed;
  inset:0;
  z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 40%, {{ config.brand_color }}15 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 60%, {{ config.brand_color_secondary }}10 0%, transparent 50%);
}
.bg-grid{
  position:fixed;
  inset:0;
  z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at center, black 30%, transparent 70%);
}
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
  z-index:0;
  animation:orbFloat 20s ease-in-out infinite;
}
.orb-1{
  width:400px;height:400px;
  background:{{ config.brand_color }};
  top:-100px;left:-100px;
  animation-delay:0s;
}
.orb-2{
  width:300px;height:300px;
  background:{{ config.brand_color_secondary }};
  bottom:-50px;right:-50px;
  animation-delay:-7s;
}
.orb-3{
  width:200px;height:200px;
  background:{{ config.accent_color }};
  top:50%;left:60%;
  opacity:0.15;
  animation-delay:-14s;
}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(30px,-30px) scale(1.1)}
  66%{transform:translate(-20px,20px) scale(0.95)}
}

/* Glass Card */
.glass-card{
  position:relative;
  z-index:10;
  width:100%;
  max-width:440px;
  margin:20px;
  background:rgba(21,21,40,0.7);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 36px;
  backdrop-filter:blur(40px);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.02),
    0 20px 60px rgba(0,0,0,0.4),
    0 0 80px var(--glow);
  overflow:hidden;
}
.glass-card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, {{ config.brand_color }}60, transparent);
}

/* Logo */
.brand{
  text-align:center;
  margin-bottom:40px;
}
.brand-icon{
  width:72px;height:72px;
  border-radius:20px;
  background:linear-gradient(135deg, {{ config.brand_color }}, {{ config.brand_color_secondary }});
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
  font-size:32px;
  box-shadow:0 8px 32px {{ config.brand_color }}40;
  position:relative;
  overflow:hidden;
}
.brand-icon::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.2) 100%);
}
.brand h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:24px;
  font-weight:700;
  letter-spacing:-0.5px;
  color:#fff;
}
.brand h1 span{
  background:linear-gradient(135deg, {{ config.brand_color }}, {{ config.brand_color_secondary }});
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand p{
  color:var(--text-dim);
  font-size:11px;
  letter-spacing:4px;
  text-transform:uppercase;
  margin-top:6px;
  font-weight:500;
}

/* Tabs */
.tab-bar{
  display:flex;
  gap:4px;
  background:var(--surface);
  border-radius:12px;
  padding:4px;
  margin-bottom:32px;
}
.tab{
  flex:1;
  padding:12px;
  background:transparent;
  border:none;
  border-radius:10px;
  color:var(--text-dim);
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
}
.tab.active{
  background:var(--surface-2);
  color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.tab:hover:not(.active){
  color:var(--text);
}

/* Form */
.form-group{
  margin-bottom:18px;
  position:relative;
}
.form-label{
  display:block;
  font-size:11px;
  font-weight:600;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-bottom:8px;
}
.input-wrap{
  position:relative;
}
.input-wrap i{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-dim);
  font-size:15px;
  transition:color 0.3s;
}
.form-input{
  width:100%;
  padding:14px 16px 14px 46px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:500;
  outline:none;
  transition:all 0.3s;
}
.form-input::placeholder{
  color:rgba(139,139,163,0.4);
}
.form-input:focus{
  border-color:{{ config.brand_color }}60;
  background:var(--surface-2);
  box-shadow:0 0 0 3px {{ config.brand_color }}10;
}
.form-input:focus + i,
.input-wrap:focus-within i{
  color:{{ config.brand_color }};
}

/* Submit Button */
.submit-btn{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg, {{ config.brand_color }}, {{ config.brand_color_secondary }});
  border:none;
  border-radius:14px;
  color:#fff;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:all 0.3s;
  margin-top:8px;
}
.submit-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
  transform:translateX(-100%);
  transition:transform 0.6s;
}
.submit-btn:hover::before{
  transform:translateX(100%);
}
.submit-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 12px 40px {{ config.brand_color }}40;
}
.submit-btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}

/* Alert */
.alert{
  display:none;
  align-items:center;
  gap:10px;
  padding:14px 16px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:13px;
  font-weight:500;
}
.alert.show{
  display:flex;
  animation:alertIn 0.3s ease;
}
@keyframes alertIn{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}
.alert.error{
  background:{{ config.danger_color }}15;
  border:1px solid {{ config.danger_color }}30;
  color:{{ config.danger_color }};
}
.alert.success{
  background:{{ config.success_color }}15;
  border:1px solid {{ config.success_color }}30;
  color:{{ config.success_color }};
}

/* Loading */
.loading{
  display:none;
  text-align:center;
  padding:30px;
}
.loading.active{
  display:block;
}
.load-ring{
  width:40px;height:40px;
  border:3px solid {{ config.brand_color }}20;
  border-top-color:{{ config.brand_color }};
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{
  color:var(--text-dim);
  font-size:12px;
  letter-spacing:3px;
  text-transform:uppercase;
  font-weight:600;
}

/* Footer */
.card-footer{
  text-align:center;
  margin-top:28px;
  padding-top:24px;
  border-top:1px solid var(--border);
}
.card-footer p{
  color:var(--text-dim);
  font-size:11px;
  letter-spacing:2px;
}
.card-footer i{
  color:{{ config.brand_color }};
  margin:0 6px;
}

/* Switch text */
.switch-text{
  text-align:center;
  margin-top:18px;
  font-size:13px;
  color:var(--text-dim);
}
.switch-text a{
  color:{{ config.brand_color }};
  text-decoration:none;
  font-weight:600;
  transition:opacity 0.3s;
}
.switch-text a:hover{
  opacity:0.8;
}

/* Floating particles */
.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}
.particle{
  position:absolute;
  width:3px;height:3px;
  background:{{ config.brand_color }};
  border-radius:50%;
  opacity:0.3;
  animation:particleFloat 15s infinite;
}
@keyframes particleFloat{
  0%,100%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:0.3}
  90%{opacity:0.3}
  100%{transform:translateY(-20vh) scale(1);opacity:0}
}

@media(max-width:480px){
  .glass-card{padding:32px 24px;border-radius:20px;margin:16px}
  .brand h1{font-size:20px}
  .brand-icon{width:60px;height:60px;font-size:26px}
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="particles" id="particles"></div>

<div class="glass-card">
  <div class="brand">
    <div class="brand-icon">{{ config.app_emoji }}</div>
    <h1>{{ config.app_name.split(' ')[0] }} <span>{{ config.app_name.split(' ')[1] if ' ' in config.app_name else '' }}</span></h1>
    <p>{{ config.app_tagline }}</p>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('login')">Sign In</button>
    <button class="tab" onclick="switchTab('register')">Sign Up</button>
  </div>

  <div class="alert" id="alert">
    <i class="fas fa-exclamation-circle"></i>
    <span id="alertText"></span>
  </div>

  <!-- LOGIN FORM -->
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" id="loginUsername" class="form-input" placeholder="Enter your username" required autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
      </div>
    </div>
    <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
    <div class="switch-text">
      Don't have an account? <a href="#" onclick="switchTab('register');return false;">Create one</a>
    </div>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" onsubmit="handleRegister(event)" style="display:none">
    <div class="form-group">
      <label class="form-label">Choose Username</label>
      <div class="input-wrap">
        <i class="fas fa-user-plus"></i>
        <input type="text" id="regUsername" class="form-input" placeholder="Create a username" required autocomplete="username">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Create Password</label>
      <div class="input-wrap">
        <i class="fas fa-key"></i>
        <input type="password" id="regPassword" class="form-input" placeholder="Create a password" required autocomplete="new-password">
      </div>
    </div>
    <button type="submit" class="submit-btn" id="regBtn">Create Account</button>
    <div class="switch-text">
      Already have an account? <a href="#" onclick="switchTab('login');return false;">Sign in</a>
    </div>
  </form>

  <div class="loading" id="loading">
    <div class="load-ring"></div>
    <p>Verifying Identity...</p>
  </div>

  <div class="card-footer">
    <p><i class="fas fa-lock"></i> {{ config.footer_text }} <i class="fas fa-lock"></i></p>
  </div>
</div>

<script>
// Particles
for(let i=0;i<25;i++){
  const p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.animationDelay=Math.random()*15+'s';
  p.style.animationDuration=(8+Math.random()*12)+'s';
  document.getElementById('particles').appendChild(p);
}

function switchTab(tab){
  const lf=document.getElementById('loginForm');
  const rf=document.getElementById('registerForm');
  const tabs=document.querySelectorAll('.tab');
  const loading=document.getElementById('loading');
  tabs.forEach(t=>t.classList.remove('active'));
  loading.classList.remove('active');
  if(tab==='login'){
    lf.style.display='block';
    rf.style.display='none';
    tabs[0].classList.add('active');
  } else {
    lf.style.display='none';
    rf.style.display='block';
    tabs[1].classList.add('active');
  }
  document.getElementById('alert').classList.remove('show');
}

function showAlert(msg,type){
  const a=document.getElementById('alert');
  const at=document.getElementById('alertText');
  a.className='alert show '+type;
  at.textContent=msg;
}

async function handleLogin(e){
  e.preventDefault();
  const u=document.getElementById('loginUsername').value.trim();
  const p=document.getElementById('loginPassword').value;
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Signing In...';
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    let data;try{data=await res.json();}catch(e){data={success:false,message:'Server error'};}
    if(data.success){
      showAlert('Access granted! Redirecting...','success');
      setTimeout(()=>window.location.href='/dashboard',700);
    } else {
      showAlert(data.message||'Login failed','error');
    }
  }catch(err){showAlert('Connection failed','error');}
  finally{btn.disabled=false;btn.innerHTML='Sign In';}
}

async function handleRegister(e){
  e.preventDefault();
  const u=document.getElementById('regUsername').value.trim();
  const p=document.getElementById('regPassword').value;
  const btn=document.getElementById('regBtn');
  btn.disabled=true;
  btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Creating...';
  try{
    const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    let data;try{data=await res.json();}catch(e){data={success:false,message:'Server error'};}
    if(data.success){
      showAlert('Account created! Please sign in.','success');
      setTimeout(()=>{switchTab('login');document.getElementById('loginUsername').value=u;},1000);
    } else {
      showAlert(data.message||'Registration failed','error');
    }
  }catch(err){showAlert('Registration failed','error');}
  finally{btn.disabled=false;btn.innerHTML='Create Account';}
}
</script>
</body>
</html>
